<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="飲食計畫">
<meta name="theme-color" content="#1a2e1a">
<title>4週飲食改造</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a18;--ink2:#3d3d38;--ink3:#7a7a72;--paper:#f5f2ec;--paper2:#ede9e0;--paper3:#e3ddd1;--green:#2d5a27;--green2:#4a8c42;--green3:#c8e6c2;--green4:#eef7ec;--amber:#c47c2b;--amber2:#fdf0dc;--red:#9b3a2f;--red2:#fcecea;--blue:#2a5080;--blue2:#e8f0f8;--r:10px;--r2:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--ink);overflow:hidden}
body{font-family:'Noto Sans TC',sans-serif;color:var(--ink);overscroll-behavior:none}
#app{height:100dvh;display:flex;flex-direction:column;background:var(--paper);max-width:430px;margin:0 auto;position:relative;overflow:hidden}
#topbar{flex-shrink:0;background:var(--green);color:#fff;padding:env(safe-area-inset-top,12px) 20px 14px;display:flex;align-items:flex-end;justify-content:space-between}
.app-title{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;letter-spacing:.5px}
.week-badge{font-size:11px;font-weight:500;background:rgba(255,255,255,.18);padding:3px 10px;border-radius:20px;letter-spacing:.3px}
#tabs{flex-shrink:0;display:flex;background:var(--green);border-bottom:2px solid rgba(255,255,255,.1)}
.tab{flex:1;padding:10px 2px 9px;font-size:9px;font-weight:500;letter-spacing:.2px;color:rgba(255,255,255,.55);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-2px}
.tab.active{color:#fff;border-bottom-color:#8fdb84}
.tab .tab-icon{font-size:15px;display:block;margin-bottom:2px}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 calc(env(safe-area-inset-bottom,16px)+16px)}
.panel{display:none}.panel.active{display:block}
.today-hero{background:linear-gradient(160deg,var(--green) 0%,#3d7a35 100%);padding:22px 20px 26px;color:#fff}
.today-day{font-size:12px;font-weight:500;opacity:.7;letter-spacing:.8px;margin-bottom:4px}
.today-theme{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;margin-bottom:8px}
.today-desc{font-size:13px;opacity:.8;line-height:1.6}
.progress-ring{margin-top:16px}
.progress-label{font-size:11px;opacity:.6;margin-bottom:6px}
.progress-bar{height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#8fdb84;border-radius:2px;transition:width .6s ease}
.section-title{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--ink3);padding:18px 20px 8px;text-transform:uppercase}
.habit-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.habit-item{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--paper3);border-radius:var(--r);padding:13px 15px;cursor:pointer;transition:all .2s;user-select:none}
.habit-item.done{background:var(--green4);border-color:var(--green3)}
.habit-check{width:22px;height:22px;flex-shrink:0;border:1.5px solid var(--paper3);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px}
.habit-item.done .habit-check{background:var(--green2);border-color:var(--green2);color:#fff}
.habit-text{font-size:14px;color:var(--ink2);line-height:1.4;flex:1}
.habit-item.done .habit-text{color:var(--green);text-decoration:line-through;text-decoration-color:var(--green3)}
.meal-cards{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.meal-card{background:#fff;border:1px solid var(--paper3);border-radius:var(--r);overflow:hidden}
.meal-header{display:flex;align-items:center;gap:10px;padding:12px 15px;cursor:pointer}
.meal-icon{font-size:20px}.meal-info{flex:1}
.meal-label{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.5px}
.meal-name{font-size:14px;font-weight:500;color:var(--ink);margin-top:1px}
.meal-chevron{font-size:12px;color:var(--ink3);transition:transform .2s}
.meal-card.open .meal-chevron{transform:rotate(180deg)}
.meal-body{display:none;padding:0 15px 13px}
.meal-card.open .meal-body{display:block}
.meal-tip{font-size:12px;color:var(--ink3);line-height:1.6;padding-top:6px;border-top:1px solid var(--paper2)}
.meal-tip strong{color:var(--green)}
.tip-card{margin:8px 16px 0;background:var(--amber2);border:1px solid #f0d4a0;border-radius:var(--r);padding:13px 15px;display:flex;gap:10px;align-items:flex-start}
.tip-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.tip-text{font-size:13px;color:var(--amber);line-height:1.6;font-style:italic}
.note-wrap{margin:12px 16px 0}
.note-area{width:100%;min-height:80px;border:1px solid var(--paper3);border-radius:var(--r);background:#fff;padding:10px 12px;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--ink2);line-height:1.6;resize:none;outline:none}
.note-area:focus{border-color:var(--green3)}
.note-save-btn{margin-top:6px;width:100%;padding:9px;border-radius:var(--r);border:1px solid var(--green3);background:var(--green4);color:var(--green);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.lookup-grid{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.lookup-card{background:#fff;border:1px solid var(--paper3);border-radius:var(--r);overflow:hidden}
.lookup-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.lookup-emoji{font-size:22px}.lookup-scene{font-size:15px;font-weight:600;color:var(--ink);flex:1}
.lookup-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;background:var(--green4);color:var(--green)}
.lookup-body{display:none;background:var(--paper);border-top:1px solid var(--paper2)}
.lookup-card.open .lookup-body{display:block}
.lookup-row{padding:11px 16px;border-bottom:1px solid var(--paper2);display:flex;gap:8px;align-items:flex-start}
.lookup-row:last-child{border-bottom:none}
.lr-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}
.lr-dot.good{background:var(--green2)}.lr-dot.tip{background:var(--amber)}.lr-dot.warn{background:var(--red)}
.lr-text{font-size:13px;color:var(--ink2);line-height:1.5}
.lr-text strong{color:var(--ink);font-weight:600}
.scripts-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.script-card{background:#fff;border:1px solid var(--paper3);border-radius:var(--r);overflow:hidden}
.script-header{padding:14px 16px;cursor:pointer;display:flex;gap:10px;align-items:center}
.script-emoji{font-size:20px;flex-shrink:0}
.script-scene{font-size:14px;font-weight:600;color:var(--ink);flex:1;line-height:1.3}
.script-body{display:none;border-top:1px solid var(--paper2)}
.script-card.open .script-body{display:block}
.script-line{padding:10px 16px;border-bottom:1px solid var(--paper2);display:flex;gap:10px;align-items:flex-start}
.script-line:last-child{border-bottom:none}
.sl-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px;letter-spacing:.3px}
.sl-tag.old{background:var(--red2);color:var(--red)}.sl-tag.new{background:var(--green4);color:var(--green)}.sl-tag.why{background:var(--blue2);color:var(--blue)}
.sl-text{font-size:13px;color:var(--ink2);line-height:1.5}
.recovery-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.rec-card{background:#fff;border:1px solid var(--paper3);border-radius:var(--r2);overflow:hidden}
.rec-header{padding:16px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
.rec-icon{font-size:24px;flex-shrink:0}
.rec-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px;font-family:'Noto Serif TC',serif}
.rec-sub{font-size:12px;color:var(--ink3);line-height:1.4}
.rec-body{display:none;border-top:1px solid var(--paper2)}
.rec-card.open .rec-body{display:block}
.rec-step{padding:12px 16px;border-bottom:1px solid var(--paper2);display:flex;gap:10px}
.rec-step:last-child{border-bottom:none}
.rec-num{width:20px;height:20px;border-radius:50%;flex-shrink:0;background:var(--green);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rec-step-text{font-size:13px;color:var(--ink2);line-height:1.6}
.rec-step-text strong{color:var(--ink);font-weight:600}
.avoid{color:var(--red);font-weight:600}
.week-tabs{display:flex;padding:12px 16px 0;gap:0}
.wtab{flex:1;padding:9px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--ink3);border-bottom:2px solid var(--paper3);cursor:pointer;transition:all .2s}
.wtab.active{color:var(--green);border-bottom-color:var(--green)}
.week-days{padding:8px 16px 0}
.week-day-card{background:#fff;border:1px solid var(--paper3);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.wday-header{display:flex;gap:12px;align-items:center;padding:12px 14px;cursor:pointer}
.wday-num{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:var(--green);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.wday-label{flex:1}
.wday-name{font-size:14px;font-weight:600;color:var(--ink)}
.wday-theme{font-size:11px;color:var(--ink3);margin-top:1px}
.wday-chevron{font-size:12px;color:var(--ink3);transition:transform .2s}
.week-day-card.open .wday-chevron{transform:rotate(180deg)}
.wday-body{display:none;border-top:1px solid var(--paper2);padding:12px 14px}
.week-day-card.open .wday-body{display:block}
.wday-section{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--green);margin-bottom:6px}
.wday-habit{font-size:13px;color:var(--ink2);line-height:1.5;padding:3px 0;display:flex;gap:8px}
.wday-habit::before{content:'✓';color:var(--green2);font-size:12px;flex-shrink:0;margin-top:1px}
.wday-meal{font-size:13px;color:var(--ink2);line-height:1.5;padding:3px 0;display:flex;gap:8px}
.wday-meal::before{content:'→';color:var(--amber);font-size:12px;flex-shrink:0;margin-top:1px}
.wday-tip-box{background:var(--amber2);border-radius:6px;padding:9px 11px;font-size:12px;color:var(--amber);line-height:1.5;font-style:italic;margin-bottom:8px}
.wday-note-box{background:var(--blue2);border-radius:6px;padding:8px 11px;font-size:12px;color:var(--blue);line-height:1.5}
.journal-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.journal-entry{background:#fff;border:1px solid var(--paper3);border-radius:var(--r);padding:14px 15px}
.je-date{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.5px;margin-bottom:3px}
.je-week-day{font-size:12px;color:var(--green);margin-bottom:8px;font-weight:600}
.je-habits{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.je-tag{font-size:10px;padding:2px 8px;border-radius:8px;background:var(--green4);color:var(--green)}
.je-note{font-size:13px;color:var(--ink2);line-height:1.6;padding-top:8px;border-top:1px solid var(--paper2)}
.je-empty{font-size:13px;color:var(--ink3);text-align:center;padding:40px 20px;line-height:1.9}
#toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,20px)+72px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;padding:9px 18px;border-radius:20px;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;z-index:999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div><div class="app-title">🌿 飲食改造計畫</div></div>
    <div class="week-badge" id="weekBadge">第 1 週</div>
  </div>
  <div id="tabs">
    <div class="tab active" onclick="switchTab('today')"><span class="tab-icon">☀️</span>今日</div>
    <div class="tab" onclick="switchTab('lookup')"><span class="tab-icon">🍱</span>外食查</div>
    <div class="tab" onclick="switchTab('scripts')"><span class="tab-icon">💬</span>腳本</div>
    <div class="tab" onclick="switchTab('recovery')"><span class="tab-icon">🔄</span>恢復</div>
    <div class="tab" onclick="switchTab('weekly')"><span class="tab-icon">📅</span>週計畫</div>
    <div class="tab" onclick="switchTab('journal')"><span class="tab-icon">📓</span>日誌</div>
  </div>
  <div id="content">
    <div class="panel active" id="panel-today">
      <div class="today-hero">
        <div class="today-day" id="todayLabel">今天</div>
        <div class="today-theme" id="todayTheme">載入中...</div>
        <div class="today-desc" id="todayDesc"></div>
        <div class="progress-ring">
          <div class="progress-label" id="progressLabel">今日習慣進度</div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>
      </div>
      <div class="section-title">今日微習慣</div>
      <div class="habit-list" id="habitList"></div>
      <div class="section-title">外食方向</div>
      <div class="meal-cards" id="mealCards"></div>
      <div id="tipCard"></div>
      <div class="section-title">今日筆記</div>
      <div class="note-wrap">
        <textarea class="note-area" id="noteArea" placeholder="記下今天吃了什麼、有什麼感受、或是哪個習慣做到了..."></textarea>
        <button class="note-save-btn" onclick="saveNote()">儲存筆記 ✓</button>
      </div>
      <div style="height:8px"></div>
    </div>
    <div class="panel" id="panel-lookup">
      <div style="padding:16px 16px 4px;font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--green)">外食場景快速查詢</div>
      <div style="padding:0 16px 8px;font-size:12px;color:var(--ink3)">點選你現在遇到的場景</div>
      <div class="lookup-grid" id="lookupGrid"></div>
    </div>
    <div class="panel" id="panel-scripts">
      <div style="padding:16px 16px 4px;font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--green)">點餐腳本</div>
      <div style="padding:0 16px 8px;font-size:12px;color:var(--ink3)">遇到高壓場景時直接用</div>
      <div class="scripts-list" id="scriptsList"></div>
    </div>
    <div class="panel" id="panel-recovery">
      <div style="padding:16px 16px 4px;font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--green)">失守後的恢復</div>
      <div style="padding:0 16px 8px;font-size:12px;color:var(--ink3)">找到你的狀況，看下一步</div>
      <div class="recovery-list" id="recoveryList"></div>
    </div>
    <div class="panel" id="panel-weekly">
      <div style="padding:16px 16px 8px;font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--green)">四週完整計畫</div>
      <div class="week-tabs" id="weekTabs"></div>
      <div class="week-days" id="weekDays"></div>
    </div>
    <div class="panel" id="panel-journal">
      <div style="padding:16px 16px 4px;font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;color:var(--green)">飲食日誌</div>
      <div style="padding:0 16px 12px;font-size:12px;color:var(--ink3)">每天的習慣打勾與筆記紀錄</div>
      <div class="journal-list" id="journalList"></div>
    </div>
  </div>
  <div id="toast"></div>
</div>
<script>
const PLAN={
  1:[
    {day:'週一',theme:'啟動日',desc:'第一天不求完美，只求比昨天多想了一秒鐘',habits:['起床後喝一杯水（300ml）','今天外食前先想好蛋白質來源'],meals:[{icon:'🍱',label:'午餐',name:'便當店選雞腿（去皮）＋燙青菜',tip:'<strong>小動作：</strong>白飯只裝七八分'},{icon:'🍜',label:'晚餐',name:'麵食選陽春麵加顆蛋，不加辣椒油',tip:'加蛋補足蛋白質，清爽又飽足'}],tip:'吃之前停一秒，問自己「有蛋白質嗎？」'},
    {day:'週二',theme:'覺察日',desc:'放慢吃飯速度是最便宜的食慾控制工具',habits:['午餐前喝半杯水或點一碗清湯','吃飯速度放慢，每口多咀嚼幾下'],meals:[{icon:'🥗',label:'午餐',name:'自助餐：先夾蛋白質再夾菜，白飯最後裝',tip:'這個順序讓你自然少吃白飯'},{icon:'🧋',label:'飲料',name:'手搖點少糖或無糖，感受一下差別',tip:'少糖版熱量少 150–200 kcal'}],tip:'飽足信號比大腦晚 20 分鐘——吃慢一點，讓身體跟上'},
    {day:'週三',theme:'測試日',desc:'5分鐘等待法：嘴饞衝動平均只持續3-5分鐘',habits:['第一次嘴饞時先等 5 分鐘再決定','記錄今天哪個時間點最想亂吃'],meals:[{icon:'🏪',label:'午餐',name:'超商：茶葉蛋×2＋無糖豆漿＋御飯糰',tip:'比便利麵更快、更飽、更便宜'},{icon:'🍽️',label:'技巧',name:'點餐時主動說「醬料放旁邊」',tip:'一個請求，減少 80–150 kcal'}],tip:'等 5 分鐘之後，通常你已經忘了想吃什麼了'},
    {day:'週四',theme:'鞏固日',desc:'習慣需要重複才能自動化，今天是鞏固的一天',habits:['重複前三天習慣中最自然的那個','觀察哪個最困難，下週改善'],meals:[{icon:'🍱',label:'午餐',name:'回到熟悉的店，用新的點餐邏輯',tip:'同一家店，不同的選擇方式'},{icon:'🥚',label:'點心',name:'嘴饞選堅果或茶葉蛋，不是餅乾',tip:'蛋白質讓飽足感撐更久'}],tip:'三個習慣執行了一個，就已經在進步'},
    {day:'週五',theme:'壓力日',desc:'週五是最容易「算了反正週末再說」的一天',habits:['特別留意情緒觸發（壓力→想吃的連結）','下班後先喝水再做任何飲食決定'],meals:[{icon:'🍲',label:'午餐',name:'任何你想吃的，但先喝湯再吃飯',tip:'湯增加飽足感，自然少吃飯'},{icon:'🥂',label:'晚餐',name:'若有聚餐：享受主菜，略過甜點',tip:'不需要全部吃，選你最想要的'}],tip:'撐過週五，就是勝利'},
    {day:'週六',theme:'彈性日',desc:'彈性日是設計出來的，不是失敗',habits:['保留「先蛋白質」這一個習慣','可以吃真正想吃的，有意識地享受'],meals:[{icon:'🌅',label:'早午餐',name:'不限制，選你最想吃的',tip:'享受是計畫的一部分'},{icon:'🌙',label:'晚餐',name:'若吃多了，下一餐回正軌就好',tip:'不需要補救或懲罰自己'}],tip:'可持續性比完美更重要'},
    {day:'週日',theme:'回顧日',desc:'不需要完美執行7天，執行了4天就是進步',habits:['回想這週哪個習慣最容易執行','下週最想改善的一個飲食場景？'],meals:[{icon:'🍽️',label:'餐食',name:'自由選擇',tip:'今天是休息日'},{icon:'📝',label:'晚餐後',name:'花 3 分鐘想想下週的一個改善點',tip:'寫下來比想著更有效'}],tip:'改變不是在一週內完成的，這週建立了基礎'},

  {icon:'😰',title:'壓力大完全失控',sub:'情緒讓你吃了平常不會吃的',steps:[{text:'<strong>先承認：</strong>壓力性進食是大腦的獎勵機制在運作，不是意志力問題'},{text:'<strong>不要懲罰：</strong>不要用運動「消耗掉」，不要明天故意少吃'},{text:'<strong>問自己：</strong>「下次這個情況，我可以先做什麼替代行為？」走動、喝水、深呼吸'}]},
];

// STATE
const today=new Date();
const DOW=today.getDay();
const DNAMES=['週日','週一','週二','週三','週四','週五','週六'];
function getPlanDay(){return DOW===0?6:DOW-1}
function getPlanWeek(){
  let start=localStorage.getItem('dietStart');
  if(!start){
    const d=new Date(today);
    d.setDate(d.getDate()-(DOW===0?6:DOW-1));
    d.setHours(0,0,0,0);
    start=d.toISOString();
    localStorage.setItem('dietStart',start);
  }
  const diff=Math.floor((today-new Date(start))/86400000);
  return Math.min(4,Math.floor(diff/7)+1);
}
const planWeek=getPlanWeek();
const planDay=getPlanDay();
const dayData=PLAN[planWeek][planDay];
const todayStr=today.toDateString();
const habitsKey='h_'+todayStr;
const noteKey='n_'+todayStr;
let doneHabits=JSON.parse(localStorage.getItem(habitsKey)||'[]');

function saveHabits(){localStorage.setItem(habitsKey,JSON.stringify(doneHabits));updateJournalMeta()}
function updateJournalMeta(){
  const k='j_'+todayStr;
  const e=JSON.parse(localStorage.getItem(k)||'{}');
  localStorage.setItem(k,JSON.stringify({...e,date:todayStr,week:planWeek,day:planDay,theme:dayData.theme,habits:[...doneHabits],note:e.note||''}));
}
function saveNote(){
  const val=document.getElementById('noteArea').value.trim();
  localStorage.setItem(noteKey,val);
  const k='j_'+todayStr;
  const e=JSON.parse(localStorage.getItem(k)||'{}');
  localStorage.setItem(k,JSON.stringify({...e,date:todayStr,week:planWeek,day:planDay,theme:dayData.theme,habits:doneHabits,note:val}));
  showToast('已儲存 ✓');
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['today','lookup','scripts','recovery','weekly','journal'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  if(id==='journal')renderJournal();
}

function renderToday(){
  document.getElementById('weekBadge').textContent='第 '+planWeek+' 週';
  document.getElementById('todayLabel').textContent=DNAMES[DOW]+'・第 '+planWeek+' 週';
  document.getElementById('todayTheme').textContent=dayData.theme;
  document.getElementById('todayDesc').textContent=dayData.desc;
  const hl=document.getElementById('habitList');
  hl.innerHTML='';
  dayData.habits.forEach((h,i)=>{
    const done=doneHabits.includes(i);
    const div=document.createElement('div');
    div.className='habit-item'+(done?' done':'');
    div.innerHTML='<div class="habit-check">'+(done?'✓':'')+'</div><div class="habit-text">'+h+'</div>';
    div.onclick=()=>{
      doneHabits.includes(i)?doneHabits=doneHabits.filter(x=>x!==i):(doneHabits.push(i),showToast('完成！繼續保持 💪'));
      saveHabits();renderToday();
    };
    hl.appendChild(div);
  });
  updateProgress();
  const mc=document.getElementById('mealCards');
  mc.innerHTML='';
  dayData.meals.forEach(m=>{
    const c=document.createElement('div');
    c.className='meal-card';
    c.innerHTML='<div class="meal-header" onclick="this.parentElement.classList.toggle(\'open\')"><span class="meal-icon">'+m.icon+'</span><div class="meal-info"><div class="meal-label">'+m.label+'</div><div class="meal-name">'+m.name+'</div></div><span class="meal-chevron">▼</span></div><div class="meal-body"><div class="meal-tip">💡 '+m.tip+'</div></div>';
    mc.appendChild(c);
  });
  document.getElementById('tipCard').innerHTML='<div class="tip-card" style="margin-top:8px"><div class="tip-icon">💡</div><div class="tip-text">'+dayData.tip+'</div></div>';
  document.getElementById('noteArea').value=localStorage.getItem(noteKey)||'';
}
function updateProgress(){
  const pct=dayData.habits.length?Math.round(doneHabits.length/dayData.habits.length*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent='今日習慣進度 '+doneHabits.length+'/'+dayData.habits.length;
}

function renderLookup(){
  const g=document.getElementById('lookupGrid');g.innerHTML='';
  LOOKUP.forEach(item=>{
    const c=document.createElement('div');c.className='lookup-card';
    c.innerHTML='<div class="lookup-header" onclick="this.parentElement.classList.toggle(\'open\')"><span class="lookup-emoji">'+item.emoji+'</span><span class="lookup-scene">'+item.scene+'</span><span class="lookup-badge">'+item.badge+'</span></div><div class="lookup-body">'+item.rows.map(r=>'<div class="lookup-row"><div class="lr-dot '+r.type+'"></div><div class="lr-text">'+r.text+'</div></div>').join('')+'</div>';
    g.appendChild(c);
  });
}

function renderScripts(){
  const l=document.getElementById('scriptsList');l.innerHTML='';
  SCRIPTS.forEach(s=>{
    const c=document.createElement('div');c.className='script-card';
    c.innerHTML='<div class="script-header" onclick="this.parentElement.classList.toggle(\'open\')"><span class="script-emoji">'+s.emoji+'</span><span class="script-scene">'+s.scene+'</span><span style="font-size:12px;color:var(--ink3)">▼</span></div><div class="script-body">'+s.lines.map(l=>'<div class="script-line"><span class="sl-tag '+l.type+'">'+(l.type==='old'?'舊':l.type==='new'?'新':'為何')+'</span><div class="sl-text">'+l.text+'</div></div>').join('')+'</div>';
    l.appendChild(c);
  });
}

function renderRecovery(){
  const l=document.getElementById('recoveryList');l.innerHTML='';
  RECOVERY.forEach(r=>{
    const c=document.createElement('div');c.className='rec-card';
    c.innerHTML='<div class="rec-header" onclick="this.parentElement.classList.toggle(\'open\')"><div class="rec-icon">'+r.icon+'</div><div><div class="rec-title">'+r.title+'</div><div class="rec-sub">'+r.sub+'</div></div></div><div class="rec-body">'+r.steps.map((s,i)=>'<div class="rec-step"><div class="rec-num">'+(i+1)+'</div><div class="rec-step-text">'+s.text+'</div></div>').join('')+'</div>';
    l.appendChild(c);
  });
}

let curWeek=1;
function renderWeekTabs(){
  const t=document.getElementById('weekTabs');t.innerHTML='';
  [1,2,3,4].forEach(w=>{
    const d=document.createElement('div');
    d.className='wtab'+(w===curWeek?' active':'');
    d.textContent='第'+w+'週'+(w===planWeek?' ●':'');
    d.onclick=()=>{curWeek=w;renderWeekTabs();renderWeekDays()};
    t.appendChild(d);
  });
}
function renderWeekDays(){
  const data=PLAN[curWeek];
  const container=document.getElementById('weekDays');container.innerHTML='';
  data.forEach((d,i)=>{
    const isToday=curWeek===planWeek&&i===planDay;
    const c=document.createElement('div');
    c.className='week-day-card'+(isToday?' open':'');
    // try to get saved note for this day
    const refDate=new Date(today);
    refDate.setDate(refDate.getDate()-(planDay-i)-((planWeek-curWeek)*7));
    const jEntry=JSON.parse(localStorage.getItem('j_'+refDate.toDateString())||'null');
    const noteHTML=jEntry&&jEntry.note?'<div class="wday-note-box">📝 '+jEntry.note+'</div>':'';
    c.innerHTML='<div class="wday-header" onclick="this.parentElement.classList.toggle(\'open\')"><div class="wday-num" style="'+(isToday?'background:var(--amber);':'')+'">'+( i+1)+'</div><div class="wday-label"><div class="wday-name">'+d.day+'・'+d.theme+(isToday?' 〔今天〕':'')+'</div><div class="wday-theme">'+d.desc+'</div></div><span class="wday-chevron">▼</span></div><div class="wday-body"><div class="wday-section">微習慣</div><div>'+d.habits.map(h=>'<div class="wday-habit">'+h+'</div>').join('')+'</div><div class="wday-section" style="margin-top:10px">外食方向</div><div>'+d.meals.map(m=>'<div class="wday-meal">'+m.label+'：'+m.name+'</div>').join('')+'</div><div class="wday-tip-box" style="margin-top:10px">💡 '+d.tip+'</div>'+noteHTML+'</div>';
    container.appendChild(c);
  });
}

function renderJournal(){
  const list=document.getElementById('journalList');list.innerHTML='';
  const entries=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('j_')){try{const e=JSON.parse(localStorage.getItem(k));if(e&&e.date)entries.push(e)}catch(err){}}
  }
  entries.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!entries.length){
    list.innerHTML='<div class="je-empty">還沒有日誌紀錄<br><br>打勾今日習慣或儲存筆記<br>就會自動出現在這裡 📝</div>';
    return;
  }
  entries.forEach(e=>{
    const d=new Date(e.date);
    const dn=DNAMES[d.getDay()]||'';
    const planD=PLAN[e.week]&&PLAN[e.week][e.day];
    const c=document.createElement('div');c.className='journal-entry';
    const hTags=(e.habits&&e.habits.length&&planD)?e.habits.map(i=>'<span class="je-tag">✓ '+(planD.habits[i]||'習慣'+(i+1))+'</span>').join(''):'<span style="font-size:11px;color:var(--ink3)">尚無習慣紀錄</span>';
    c.innerHTML='<div class="je-date">'+(d.getMonth()+1)+' / '+d.getDate()+' '+dn+'</div><div class="je-week-day">第 '+e.week+' 週・'+(e.theme||'')+'</div><div class="je-habits">'+hTags+'</div>'+(e.note?'<div class="je-note">'+e.note+'</div>':'');
    list.appendChild(c);
  });
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

renderToday();renderLookup();renderScripts();renderRecovery();renderWeekTabs();renderWeekDays();
</script>
